<!doctype html> 
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>




 <!--
<!doctype html> -> This tells the browser that this document is written in HTML5. Without this, the browser may behave unpredictable
<html lang="en"> -> Starts the html document. lang="en" means the manguage is english(helps browser, screen readers, SEO)
<head> -> Contains metadata (information about the page, not visible on the UI).
<meta charset="UTF-8" /> -> (Unique code transformation Format - 8 bit) Sets the character encoding to UTF-8. Supports all characters(A-Z, symbols, emojis, etc). (UTF-8 is character encoding system. it tells the browser how to convert binary data (0s and 1s) into readable characters. UTF-8 maps all these characters to binary)
<link rel="icon" type="image/svg+xml" href="/vite.svg" /> -> Adds a favicon (small icon in browser tab)
<meta name="viewport" content="width=device-width, initial-scale=1.0" /> -> makes the website responsive
title -> sets the title of the webpage. appears in the browser tab
body -> contains everything that appears on the screen



-->
